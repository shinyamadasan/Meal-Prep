<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meal Prep — Tests</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 24px auto; padding: 0 16px; }
    h1 { font-size: 20px; }
    #summary { font-size: 16px; font-weight: 600; padding: 8px 12px; border-radius: 6px; margin: 12px 0; }
    .ok { background: #e6f5ea; color: #1a7f37; }
    .bad { background: #fde8e8; color: #b42318; }
    ul { list-style: none; padding: 0; }
    li { padding: 4px 0; border-bottom: 1px solid #eee; font-size: 14px; }
    .pass::before { content: "✓ "; color: #1a7f37; font-weight: 700; }
    .fail::before { content: "✗ "; color: #b42318; font-weight: 700; }
    .fail { color: #b42318; }
    code { background: #f3f3f3; padding: 1px 4px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Meal Prep — Unit Tests</h1>
  <p>Open this file in a browser. Tests run against the pure functions in <code>app.js</code>.</p>
  <div id="summary"></div>
  <ul id="results"></ul>

  <!-- Load the real app code; its globals (functions are on window, consts are
       script-scoped and visible to the classic script below) become testable. -->
  <script src="app.js"></script>
  <script>
    // Runs synchronously right after app.js parses — before DOMContentLoaded,
    // so initApp() has not fired yet and won't add noise to these results.
    (function () {
      var results = [];
      function check(name, cond) { results.push({ name: name, pass: !!cond }); }
      function approx(a, b) { return Math.abs(a - b) < 0.001; }

      // --- toGrams: unit conversion the nutrition math depends on ---
      check('toGrams 1 kg = 1000 g', toGrams(1, 'kg') === 1000);
      check('toGrams 2 g = 2 g', toGrams(2, 'g') === 2);
      check('toGrams 1 tbsp = 15 g', toGrams(1, 'tbsp') === 15);
      check('toGrams 1 tsp = 5 g', toGrams(1, 'tsp') === 5);
      check('toGrams 1 cup = 240 g', toGrams(1, 'cup') === 240);
      check('toGrams unknown unit falls back to x1', toGrams(7, 'zzz') === 7);
      check('toGrams missing unit treated as grams', toGrams(3) === 3);

      // --- normalizeIngredientName: the fix for parenthetical/adjective names ---
      check("normalize 'Chicken (bone-in pieces)' -> 'chicken'",
        normalizeIngredientName('Chicken (bone-in pieces)') === 'chicken');
      check("normalize 'Garlic or shallots' -> 'garlic'",
        normalizeIngredientName('Garlic or shallots') === 'garlic');
      check("normalize 'Fresh Tomato' -> 'tomato'",
        normalizeIngredientName('Fresh Tomato') === 'tomato');

      // --- findIngredientNutrition: must match common + messy names ---
      var chicken = findIngredientNutrition('Chicken Breast');
      check('findIngredientNutrition matches "Chicken Breast"', chicken && chicken.calories > 0);
      var messyChicken = findIngredientNutrition('Chicken (bone-in pieces)');
      check('findIngredientNutrition matches messy "Chicken (bone-in pieces)"',
        messyChicken && messyChicken.calories > 0);

      // --- calculateRecipeNutrition: nutritionPerServing path scales by servings ---
      var r = {
        baseServings: 2, currentServings: 2,
        nutritionPerServing: { calories: 100, protein: 10, carbs: 20, fat: 5, fiber: 3, sodium: 200 }
      };
      var n = calculateRecipeNutrition(r);
      check('calculateRecipeNutrition total calories = perServing * currentServings',
        approx(n.calories, 200));
      check('calculateRecipeNutrition total protein scales too', approx(n.protein, 20));

      // calories === 0 must fall through to ingredient lookup (not return zeros)
      var r2 = {
        baseServings: 1, currentServings: 1,
        nutritionPerServing: { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, sodium: 0 },
        baseIngredients: [{ name: 'Chicken Breast', baseQuantity: 200, unit: 'g' }]
      };
      var n2 = calculateRecipeNutrition(r2);
      check('zero nutritionPerServing falls through to ingredient calc (calories > 0)',
        n2.calories > 0);

      // --- normalizeRecipes: defensive backfill of missing structural fields ---
      var bare = normalizeRecipes([{ id: 1 }])[0];
      check('normalizeRecipes fills baseIngredients []', Array.isArray(bare.baseIngredients));
      check('normalizeRecipes fills baseServings = 1', bare.baseServings === 1);
      check('normalizeRecipes fills category', bare.category === 'Main Dish');
      check('normalizeRecipes fills nutritionPerServing object',
        bare.nutritionPerServing && typeof bare.nutritionPerServing === 'object');
      var kept = normalizeRecipes([{ name: 'My Adobo', baseServings: 4 }])[0];
      check('normalizeRecipes does NOT overwrite existing name', kept.name === 'My Adobo');
      check('normalizeRecipes does NOT overwrite existing baseServings', kept.baseServings === 4);

      // --- freshness tracking (pantry + cooked meals) ---
      check('todayISO format YYYY-MM-DD', /^\d{4}-\d{2}-\d{2}$/.test(todayISO()));
      check('categoryShelfLife protein = 3', categoryShelfLife('Protein') === 3);
      check('categoryShelfLife pantry = 365', categoryShelfLife('Pantry') === 365);
      check('categoryShelfLife unknown = 7', categoryShelfLife('zzz') === 7);
      check('inferCategory "Chicken Breast" = Protein', inferCategory('Chicken Breast') === 'Protein');
      check('daysLeftFrom today + 5 days = 5', daysLeftFrom(todayISO(), 5) === 5);
      check('daysLeftFrom null date = null', daysLeftFrom(null, 5) === null);
      check('freshnessStatus 5 = ok', freshnessStatus(5).cls === 'fresh-ok');
      check('freshnessStatus 2 = warn', freshnessStatus(2).cls === 'fresh-warn');
      check('freshnessStatus -1 = expired', freshnessStatus(-1).cls === 'fresh-expired');
      check('freshnessStatus 0 = "Use today!"', freshnessStatus(0).label === 'Use today!');

      // --- pantry deduction when cooking ---
      check('isStaple: Pantry category = staple', isStaple({ category: 'Pantry' }) === true);
      check('isStaple: Protein = not staple', isStaple({ category: 'Protein' }) === false);
      check('isStaple: explicit override wins', isStaple({ category: 'Pantry', staple: false }) === false);
      AppState.pantry = [
        { id: 'p1', name: 'Pork', category: 'Protein', unit: 'kg', quantity: 1 },
        { id: 'p2', name: 'Eggs', category: 'Protein', unit: 'pieces', quantity: 12 },
        { id: 'p3', name: 'Salt', category: 'Pantry', unit: 'g', quantity: 500 }
      ];
      var dedRecipe = {
        baseServings: 2, currentServings: 2,
        baseIngredients: [
          { name: 'Pork', baseQuantity: 500, unit: 'g' },
          { name: 'Eggs', baseQuantity: 2, unit: 'pieces' },
          { name: 'Salt', baseQuantity: 1, unit: 'tsp' }
        ]
      };
      var ded = deductIngredientsForRecipe(dedRecipe);
      check('deduct: 1kg pork - 500g = 0.5kg', Math.abs(AppState.pantry[0].quantity - 0.5) < 0.001);
      check('deduct: 12 eggs - 2 = 10', AppState.pantry[1].quantity === 10);
      check('deduct: salt (staple) untouched', AppState.pantry[2].quantity === 500);
      check('deduct: 2 tracked items reported, salt skipped', ded.deducted.length === 2);
      AppState.pantry = [];

      // --- XSS defenses for shared recipes ---
      check('escapeHtml neutralizes <img onerror>',
        escapeHtml('<img src=x onerror=alert(1)>') === '&lt;img src=x onerror=alert(1)&gt;');
      var malicious = {
        name: '<img src=x onerror=alert(1)>',
        instructions: 'x</p><script>steal()</script>',
        baseIngredients: [{ name: 'Pork<svg onload=evil>', unit: 'g' }],
        servings: 4
      };
      var cleaned = stripTagsDeep(malicious);
      check('stripTagsDeep removes tags from name', cleaned.name.indexOf('<') < 0 && cleaned.name.indexOf('>') < 0);
      check('stripTagsDeep removes tags from instructions', cleaned.instructions.indexOf('<') < 0);
      check('stripTagsDeep removes tags from nested ingredient', cleaned.baseIngredients[0].name.indexOf('<') < 0);
      check('stripTagsDeep preserves non-strings', cleaned.servings === 4);

      // --- photos kept out of the main document ---
      AppState.recipes = [
        { id: 1, name: 'Adobo', photo: 'data:image/jpeg;base64,AAAA' },
        { id: 2, name: 'Sinigang' }
      ];
      var strippedRecipes = AppState.recipes.map(function (r) {
        if (!r.photo) return r;
        var c = Object.assign({}, r); delete c.photo; return c;
      });
      check('photo stripped from main-doc copy', strippedRecipes[0].photo === undefined);
      check('original recipe keeps photo in memory', AppState.recipes[0].photo === 'data:image/jpeg;base64,AAAA');
      recipePhotoCache = {};
      cacheInlinePhotos();
      check('inline photo cached by id', recipePhotoCache['1'] === 'data:image/jpeg;base64,AAAA');
      AppState.recipes = [{ id: 1, name: 'Adobo' }, { id: 2, name: 'Sinigang' }]; // reload w/o photos
      attachPhotosFromCache();
      check('photo re-attached from cache after reload', AppState.recipes[0].photo === 'data:image/jpeg;base64,AAAA');
      AppState.recipes = [];
      recipePhotoCache = {};

      // --- render ---
      var passed = results.filter(function (r) { return r.pass; }).length;
      var total = results.length;
      var summary = document.getElementById('summary');
      summary.textContent = passed + ' / ' + total + ' passed';
      summary.className = passed === total ? 'ok' : 'bad';

      var ul = document.getElementById('results');
      results.forEach(function (r) {
        var li = document.createElement('li');
        li.className = r.pass ? 'pass' : 'fail';
        li.textContent = r.name;
        ul.appendChild(li);
      });

      console.log('[tests] ' + passed + '/' + total + ' passed');
      results.filter(function (r) { return !r.pass; })
             .forEach(function (r) { console.error('[FAIL] ' + r.name); });
    })();
  </script>
</body>
</html>
