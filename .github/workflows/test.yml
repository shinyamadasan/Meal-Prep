name: Button tests

# Runs the Playwright button tests automatically. No AI/tokens involved — this is
# just GitHub's servers running `npm test`. Free for public repos.
on:
  push:
    branches: [main]
    # Only bother when something testable changed (skip pure docs pushes).
    paths:
      - 'app.js'
      - 'index.html'
      - 'style.css'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test.yml'
  workflow_dispatch: {} # also lets you run it by hand from the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # The tests hit the live GitHub Pages site, which redeploys ~1 min after a
      # push. Wait so we test THIS push's version, not the previous one.
      - name: Wait for GitHub Pages to deploy
        run: sleep 90

      - name: Run button tests
        run: npm test

      # If anything fails, keep the HTML report so you can see what broke.
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
